name: CI
on:
  pull_request:
    types:
      - closed
    branches:
      - main
  push:
    branches:
      - '**'
  workflow_dispatch:
  
jobs:
  build-swiftpm:
    name: Build SwiftPM
    uses: oversizedev/GithubWorkflows/.github/workflows/build-swiftpm.yml@main
    strategy:
      matrix:
        destination:
          - platform=iOS Simulator,name=iPhone 17,OS=26.2
          - platform=watchOS Simulator,name=Apple Watch SE 3 (40mm),OS=26.2
          - platform=tvOS Simulator,name=Apple TV 4K (3rd generation) (at 1080p),OS=26.2
          - platform=macOS,arch=arm64
    with:
      package: OversizeUI
      destination: ${{ matrix.destination }}
    secrets: inherit
    
  build-iOS-example:
    name: Build iOS example
    needs: build-swiftpm
    uses: oversizedev/GithubWorkflows/.github/workflows/build-app.yml@main
    strategy:
      matrix:
        destination:
          - platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2
          - platform=iOS Simulator,name=iPad Air 11-inch (M3),OS=26.2
    with:
      path: Example/Example
      scheme: Example (iOS)
      destination: ${{ matrix.destination }}
    secrets: inherit
    
  build-macOS-example:
    name: Build macOS examples
    needs: build-swiftpm
    uses: oversizedev/GithubWorkflows/.github/workflows/build-app.yml@main
    with:
      path: Example/Example
      scheme: Example (macOS)
      destination: platform=macOS,arch=arm64
    secrets: inherit
    
  build-tvOS-example:
    name: Build tvOS examples
    needs: build-swiftpm
    uses: oversizedev/GithubWorkflows/.github/workflows/build-app.yml@main
    strategy:
      matrix:
        destination:
          - platform=tvOS Simulator,name=Apple TV 4K (3rd generation) (at 1080p),OS=26.2
          - platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=26.2
    with:
      path: Example/Example
      scheme: Example (tvOS)
      destination: ${{ matrix.destination }}
    secrets: inherit
    
  build-watchOS-example:
    name: Build watchOS examples
    needs: build-swiftpm
    uses: oversizedev/GithubWorkflows/.github/workflows/build-app.yml@main
    strategy:
      matrix:
        destination:
          - platform=watchOS Simulator,name=Apple Watch SE 3 (40mm),OS=26.2
    with:
      path: Example/Example
      scheme: Example (watchOS)
      destination: ${{ matrix.destination }}
    secrets: inherit

  bump:
    name: Bump version
    if: github.ref == 'refs/heads/main'
    needs:
      - build-swiftpm
      - build-iOS-example
      - build-macOS-example
      - build-tvOS-example
      - build-watchOS-example

    uses: oversizedev/GithubWorkflows/.github/workflows/bump.yml@main
    secrets: inherit
